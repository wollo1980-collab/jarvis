  <rect x="230" y="1082" width="13" height="13" rx="3" fill="#f5b53d"/>
  <text x="250" y="1093" font-size="13" fill="#e7edf6" fill-opacity="0.7">Teilweise &#8212; L&#252;cken offen</text>
  <rect x="440" y="1082" width="13" height="13" rx="3" fill="none" stroke="#7a8595" stroke-dasharray="3 2"/>
  <text x="460" y="1093" font-size="13" fill="#e7edf6" fill-opacity="0.7">Ziel &#8212; noch nicht real</text>
  <text x="860" y="1093" text-anchor="end" font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#e7edf6" fill-opacity="0.45">12 &#183; 5 &#183; 2 &#8212; Stand 2026-07-24</text>
