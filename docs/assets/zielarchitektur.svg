      <stop offset="0%" stop-color="#5cc8ff" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#5cc8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="34%" cy="30%" r="80%">
