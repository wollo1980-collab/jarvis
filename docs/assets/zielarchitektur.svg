  <text x="60" y="1021" font-size="12" fill="#e7edf6" fill-opacity="0.62"><tspan fill="#ffb454" font-size="15">&#8635;</tspan>  Fehlschlag &#8594; Recovery &#8594; Replan   &#183;   Memory schreibt zur&#252;ck nach oben   &#183;   RUNNING&#8594;COMPLETED verboten (immer &#252;ber VERIFYING)</text>

  <!-- ambient bottom = Observability -->
  <line x1="24" y1="1044" x2="876" y2="1044" stroke="#e7edf6" stroke-opacity="0.1"/>
  <circle cx="48" cy="1058" r="5" fill="#f5b53d"/>
  <text x="62" y="1062" font-family="ui-monospace, Consolas, monospace" font-size="12" letter-spacing="1.5" fill="#e7edf6" fill-opacity="0.6">OBSERVABILITY &#183; BEGLEITET JEDEN SCHRITT &#8212; KOSTEN &#183; LOGGING (TRACING/METRIKEN/REPLAY = ZIEL)</text>

  <!-- legend -->
  <rect x="40" y="1082" width="13" height="13" rx="3" fill="#43d6a2"/>
