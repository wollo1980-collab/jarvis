    <text x="56" y="176" font-size="15" font-weight="620" fill="#e7edf6">Wake &amp; Sprache</text>
    <text x="56" y="195" font-size="11.5" fill="#e7edf6" fill-opacity="0.55">h&#246;rt zu, meldet ein Ereignis</text>
